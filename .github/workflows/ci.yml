name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - run: node dist/cli.js --help
      - run: node dist/cli.js validate --root examples/basic/skills
      - run: node dist/cli.js lock --root examples/basic/skills
      - run: node dist/cli.js graph --root examples/basic/skills --mermaid
      - run: npm pack --dry-run
